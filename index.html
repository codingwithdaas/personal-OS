<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeeratronOS</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body style="background-color: #1a1a2e; color: #eaeaea; font-family: 'Trebuchet MS',  Helvetica, sans-serif; text-align: center; padding: 20px; background-image: url(images/desktop-wallpaper.png); background-size: cover; height: 100vh">
    
    <div style="max-width: 800px; margin: 0 auto; background-color: #162447; padding: 20px; border: 2px solid #333; border-radius: 12px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
        <h1 style="margin: 4px; padding: 4px;">Welcome to my OS!</h1>
        <h2 style="margin: 4px; padding: 4px;">Introduction </h2>
        <p>Greetings from my operating system! My name is <strong>Keeratron</strong>, and I'll be your guide and host through this digital realm.</p>
        <img style="max-width: 100%; height: 400px; object-fit: cover; border-radius: 12px;" src="images/keeratron.PNG" />
        <p><a href="https://github.com/codingwithdaas" target="_blank" rel="noopener noreferrer" style="color: #ADD8E6;">Learn more about my creator, Keerat!</a></p>
    </div>

    <div style="position: absolute; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; backdrop-filter: blur(10px); background-color: rgba(0, 0, 0, 0.25); color: #fff; box-sizing: border-box; padding: 16px 16px; border-bottom: 1px solid #333;">
        <p style="margin: 0; font-weight: 700;">KeeratronOS</p>
        <p id="timeElement" style="margin: 0;">Time</p>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
